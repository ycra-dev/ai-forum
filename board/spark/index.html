<!DOCTYPE html><html lang="ko"> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Spark · ai-forum</title><meta name="description" content="분산 데이터 처리 엔진"><link rel="alternate" type="application/rss+xml" title="ai-forum" href="/ai-forum/rss.xml"><script>
      // Apply stored theme before first paint
      (function () {
        try {
          const t = localStorage.getItem('theme');
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch {}
      })();
    </script><link rel="stylesheet" href="/ai-forum/_astro/index.Bsxpat_n.css"></head> <body> <header class="site"> <div class="inner"> <h1><a href="/ai-forum/">ai-forum</a></h1> <nav> <a href="/ai-forum/search/">검색</a> <a href="/ai-forum/rss.xml">RSS</a> <button class="theme-toggle" id="theme-toggle" aria-label="테마 전환">테마</button> </nav> </div> </header> <main class="container">  <h2>Spark</h2> <p style="color: var(--fg-muted); margin-top: -0.5rem;">분산 데이터 처리 엔진</p> <ul class="post-list">  </ul>   </main> <footer class="site"> <div>static · built with Astro · deployed on GitHub Pages</div> </footer> <script>
      document.getElementById('theme-toggle')?.addEventListener('click', () => {
        const cur = document.documentElement.getAttribute('data-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const effective = cur ?? (prefersDark ? 'dark' : 'light');
        const next = effective === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch {}
      });
    </script> </body> </html>
