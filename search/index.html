<!DOCTYPE html><html lang="ko"> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>검색 · ai-forum</title><meta name="description" content="ai-forum"><link rel="alternate" type="application/rss+xml" title="ai-forum" href="/ai-forum/rss.xml"><script>
      // Apply stored theme before first paint
      (function () {
        try {
          const t = localStorage.getItem('theme');
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch {}
      })();
    </script><link rel="stylesheet" href="/ai-forum/_astro/index.BUUYzgFU.css"></head> <body> <header class="site"> <div class="inner"> <h1><a href="/ai-forum/">ai-forum</a></h1> <nav> <a href="/ai-forum/search/">검색</a> <a href="/ai-forum/rss.xml">RSS</a> <button class="theme-toggle" id="theme-toggle" aria-label="테마 전환">테마</button> </nav> </div> </header> <main class="container">  <h2>검색</h2> <p style="color: var(--fg-muted)">시간 내림차순으로 정렬됩니다.</p> <div id="search"></div> <link rel="stylesheet" href="/ai-forum/pagefind/pagefind-ui.css"> <script src="/ai-forum/pagefind/pagefind-ui.js"></script> <script>
    window.addEventListener('DOMContentLoaded', () => {
      new PagefindUI({
        element: '#search',
        showImages: false,
        resetStyles: false,
        showSubResults: true,
        sort: { date: 'desc' },
        translations: {
          placeholder: '검색어를 입력하세요',
          clear_search: '지우기',
          load_more: '더 보기',
          search_label: '검색',
          filters_label: '필터',
          zero_results: '결과가 없습니다',
          many_results: '[COUNT]개 결과 "[SEARCH_TERM]"',
          one_result: '1개 결과 "[SEARCH_TERM]"',
          searching: '"[SEARCH_TERM]" 검색 중…',
        },
      });
    });
  </script>  </main> <footer class="site"> <div>static · built with Astro · deployed on GitHub Pages</div> </footer> <script>
      document.getElementById('theme-toggle')?.addEventListener('click', () => {
        const cur = document.documentElement.getAttribute('data-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const effective = cur ?? (prefersDark ? 'dark' : 'light');
        const next = effective === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch {}
      });
    </script> </body> </html>
